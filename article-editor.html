<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Writing</title>
  <meta name="description" content="带智能续写能力的单页文章编辑器。">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23b45309' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='1.5' y='1.5' width='21' height='21' fill='%23f8f4ec' stroke='%23d7cdc2'/%3E%3Cpath d='M5 19h4l9.5-9.5a2.8 2.8 0 0 0-4-4L5 15v4Z'/%3E%3Cpath d='m13.5 6.5 4 4'/%3E%3Cpath d='M5 15h4v4'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:wght@400;500&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f8f4ec;
      --paper-soft: #f5eee1;
      --paper-strong: rgba(248, 243, 234, 0.98);
      --ink: #1d1814;
      --muted: #6a6057;
      --line: #d7cdc2;
      --rust: #b45309;
      --rust-soft: rgba(180, 83, 9, 0.1);
      --ok: #2e7d32;
      --shadow: 0 18px 60px rgba(64, 47, 30, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      color: var(--ink);
      background: var(--paper);
      font-family: "Noto Serif SC", "Noto Sans SC", serif;
      font-size: 15px;
      font-weight: 300;
      line-height: 1.8;
      letter-spacing: 0;
      overflow-x: hidden;
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.16), transparent 42%);
      content: "";
      pointer-events: none;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      background: transparent;
      cursor: pointer;
    }

    .page {
      width: min(1380px, calc(100% - 56px));
      margin: 0 auto;
      padding: 42px 0 54px;
    }

    .masthead {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 28px;
      margin-bottom: 24px;
    }

    .eyebrow {
      color: var(--muted);
      font-family: "Fragment Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 8px;
      font-size: clamp(30px, 4vw, 54px);
      font-weight: 600;
      line-height: 1.25;
    }

    .title-mark {
      display: inline-flex;
      width: 42px;
      height: 42px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      color: var(--rust);
      background: var(--paper-strong);
    }

    .title-mark svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .masthead p {
      max-width: 34em;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
    }

    .workbench {
      padding: 18px;
      border: 1px solid var(--line);
      background: var(--paper-strong);
      box-shadow: var(--shadow);
    }

    .editor-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 12px;
      align-items: stretch;
    }

    .writer,
    .copilot {
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--ink);
      background: var(--paper-soft);
      box-shadow: none;
    }

    .writer {
      display: flex;
      min-width: 0;
      flex-direction: column;
      overflow: hidden;
    }

    .windowbar,
    .writer-foot,
    .copilot-head {
      display: flex;
      align-items: center;
    }

    .windowbar {
      justify-content: space-between;
      gap: 16px;
      min-height: 62px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
    }

    .document-meta,
    .window-actions {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 12px;
    }

    .document-meta {
      flex: 1;
    }

    .dots {
      display: inline-flex;
      flex: 0 0 auto;
      gap: 8px;
    }

    .dots i {
      display: block;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--paper-strong);
    }

    .dots i:nth-child(2) {
      background: var(--paper-strong);
    }

    .dots i:nth-child(3) {
      background: var(--rust-soft);
    }

    .title-input {
      width: min(360px, 100%);
      min-width: 120px;
      height: 38px;
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
      font-family: "Noto Sans SC", sans-serif;
      font-size: 16px;
      font-weight: 500;
    }

    .title-input::placeholder {
      color: var(--muted);
    }

    .save-state {
      color: var(--muted);
      font-family: "Noto Sans SC", sans-serif;
      font-size: 11px;
      white-space: nowrap;
    }

    .save-state::before {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin-right: 6px;
      border: 1px solid var(--ok);
      border-radius: 999px;
      content: "";
      vertical-align: middle;
    }

    .speed-pill {
      display: inline-flex;
      min-height: 36px;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      border-radius: 3px;
      color: var(--muted);
      background: var(--paper-strong);
      font-family: "Noto Sans SC", sans-serif;
      font-size: 12px;
      white-space: nowrap;
    }

    .speed-pill::before {
      margin-right: 6px;
      content: "◎";
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      color: var(--muted);
      font-family: "Noto Sans SC", sans-serif;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      font-size: 18px;
    }

    .icon-btn:hover,
    .suggestion:hover {
      color: var(--rust);
      background: rgba(180, 83, 9, 0.08);
    }

    .writing-well {
      position: relative;
      flex: 1;
      min-height: 560px;
      margin: 12px 14px 0;
      border: 1px solid var(--line);
      border-radius: 3px;
      background: var(--paper-strong);
      overflow: hidden;
    }

    .writing-well:focus-within {
      border-color: var(--rust);
    }

    textarea {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      min-height: 560px;
      height: 100%;
      resize: vertical;
      border: 0;
      outline: 0;
      padding: 32px 34px;
      color: var(--ink);
      background: transparent;
      font-family: "Noto Serif SC", "Noto Sans SC", serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 2;
      letter-spacing: 0;
      caret-color: var(--rust);
    }

    textarea::placeholder {
      color: var(--muted);
    }

    .ghost-layer {
      position: absolute;
      z-index: 2;
      inset: 0;
      display: block;
      min-height: 560px;
      padding: 32px 34px;
      color: transparent;
      font-family: "Noto Serif SC", "Noto Sans SC", serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 2;
      letter-spacing: 0;
      white-space: pre-wrap;
      overflow: hidden;
      pointer-events: none;
    }

    .ghost-layer.is-hidden {
      display: none;
    }

    .ghost-text {
      color: rgba(106, 96, 87, 0.55);
      font-style: italic;
    }

    .writer-foot {
      min-height: 58px;
      justify-content: space-between;
      gap: 14px;
      padding: 10px 19px 14px;
      color: var(--muted);
      font-family: "Noto Sans SC", sans-serif;
      font-size: 12px;
    }

    .stats,
    .keys {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }

    .keys {
      justify-content: flex-end;
      color: var(--muted);
    }

    .pulse {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--rust);
      box-shadow: 0 0 0 4px rgba(180, 83, 9, 0.1);
    }

    kbd {
      min-width: 32px;
      padding: 3px 8px;
      border: 1px solid var(--line);
      border-radius: 3px;
      color: var(--muted);
      background: var(--paper-strong);
      font: inherit;
      text-align: center;
    }

    .copilot {
      position: relative;
      display: flex;
      min-width: 0;
      flex-direction: column;
      overflow: hidden;
    }

    .copilot-head {
      min-height: 62px;
      justify-content: space-between;
      padding: 13px 19px;
      border-bottom: 1px solid var(--line);
      font-family: "Noto Sans SC", sans-serif;
    }

    .copilot-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 500;
    }

    .orb {
      display: inline-flex;
      width: 26px;
      height: 26px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--rust);
      background: var(--paper-strong);
      font-size: 13px;
    }

    .group {
      padding: 16px 19px 0;
      font-family: "Noto Sans SC", sans-serif;
    }

    .group h2 {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.5;
    }

    .group h2 small {
      color: var(--muted);
      font-size: 11px;
      font-weight: 400;
    }

    .reference-upload {
      display: inline-flex;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 3px;
      color: var(--muted);
      background: var(--paper-strong);
      font-size: 12px;
      cursor: pointer;
    }

    .reference-upload:hover {
      border-color: var(--rust);
      color: var(--rust);
    }

    .reference-upload input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .reference-note {
      margin-top: 9px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
    }

    .reference-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .reference-empty,
    .reference-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 3px;
      background: var(--paper-strong);
      font-size: 12px;
      line-height: 1.6;
    }

    .reference-item input {
      width: 14px;
      height: 14px;
      margin-top: 3px;
      accent-color: var(--rust);
    }

    .reference-name {
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    .reference-meta {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    .reference-remove {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .reference-remove:hover {
      color: var(--rust);
    }

    .paper-btn {
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      min-width: 142px;
      padding: 0 20px;
      border: 1px solid var(--rust);
      color: #fff7ed;
      background: var(--rust);
      font-family: "Noto Sans SC", sans-serif;
    }

    .workbench > .paper-btn {
      margin-top: 14px;
    }

    .paper-btn.ghost {
      color: var(--rust);
      background: transparent;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 980px) {
      .page {
        width: min(100% - 32px, 820px);
        padding-top: 28px;
      }

      .masthead {
        align-items: start;
        flex-direction: column;
        gap: 8px;
      }

      .editor-grid {
        grid-template-columns: 1fr;
      }

      .writing-well,
      textarea {
        min-height: 460px;
      }
    }

    @media (max-width: 680px) {
      .page {
        width: calc(100% - 24px);
        padding-bottom: 28px;
      }

      .workbench {
        padding: 10px;
      }

      h1 {
        font-size: 32px;
      }

      .masthead p {
        font-size: 15px;
      }

      .windowbar,
      .writer-foot {
        align-items: stretch;
        flex-direction: column;
      }

      .document-meta,
      .window-actions,
      .keys {
        justify-content: flex-start;
      }

      .document-meta {
        flex-wrap: wrap;
      }

      .title-input {
        order: 2;
        width: 100%;
      }

      .speed-pill {
        width: 100%;
      }

      .writing-well {
        min-height: 390px;
        margin-right: 10px;
        margin-left: 10px;
      }

      textarea {
        min-height: 390px;
        padding: 22px 18px;
        font-size: 16px;
        line-height: 1.96;
      }

      .ghost-layer {
        min-height: 390px;
        padding: 22px 18px;
        font-size: 16px;
        line-height: 1.96;
      }

      .paper-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="masthead">
      <div>
        <div class="eyebrow">Article Editor</div>
        <h1>
          <span class="title-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M5 19h4l9.5-9.5a2.8 2.8 0 0 0-4-4L5 15v4Z"/><path d="m13.5 6.5 4 4"/><path d="M5 15h4v4"/></svg>
          </span>
          Vibe Writing
        </h1>
      </div>
    </header>

    <section class="workbench" aria-label="文章编辑工作台">
      <div class="editor-grid">
        <section class="writer" aria-label="文章编辑器">
          <div class="windowbar">
            <div class="document-meta">
              <span class="dots" aria-hidden="true"><i></i><i></i><i></i></span>
              <label class="sr-only" for="title">标题</label>
              <input id="title" class="title-input" maxlength="80" placeholder="无标题文章">
              <span id="save-state" class="save-state">本页会自动保存</span>
            </div>
            <div class="window-actions">
              <span class="speed-pill">高速模式 400 tokens/s</span>
              <button class="icon-btn" type="button" title="设置" aria-label="设置">⚙</button>
            </div>
          </div>

          <div class="writing-well">
            <label class="sr-only" for="content">正文</label>
            <textarea id="content"></textarea>
            <div id="ghost-layer" class="ghost-layer is-hidden" aria-hidden="true"><span id="ghost-before"></span><span id="ghost-text" class="ghost-text"></span><span id="ghost-after"></span></div>
          </div>

          <footer class="writer-foot">
            <div class="stats">
              <span id="count">字数 0</span>
              <span id="time">预计阅读时间 0 分钟</span>
            </div>
            <div class="keys">
              <span class="pulse"></span>
              AI 正在预测
              <kbd>Tab</kbd>
              接受
              <kbd>Esc</kbd>
              忽略
            </div>
          </footer>
        </section>

        <aside class="copilot" aria-label="写作上下文">
          <div class="copilot-head">
            <div class="copilot-title"><span class="orb" aria-hidden="true">✦</span>写作上下文</div>
            <span aria-hidden="true">⚙</span>
          </div>

          <section class="group">
            <h2>参考文件 <small>勾选后参与续写</small></h2>
            <label class="reference-upload">
              上传文件
              <input id="reference-files" type="file" multiple accept=".txt,.md,.markdown,.html,.htm,.json,.csv,text/plain,text/markdown,text/html,application/json,text/csv">
            </label>
            <p class="reference-note">当前读取文本类文件。选中的内容会作为续写参考。</p>
            <div id="reference-list" class="reference-list">
              <div class="reference-empty">还没有参考文件。</div>
            </div>
          </section>

        </aside>
      </div>

      <button id="copy" class="paper-btn ghost" type="button">复制 Markdown</button>
    </section>
  </main>

  <script>
    (function () {
      var title = document.getElementById("title");
      var content = document.getElementById("content");
      var ghostLayer = document.getElementById("ghost-layer");
      var ghostBefore = document.getElementById("ghost-before");
      var ghostText = document.getElementById("ghost-text");
      var ghostAfter = document.getElementById("ghost-after");
      var count = document.getElementById("count");
      var time = document.getElementById("time");
      var saveState = document.getElementById("save-state");
      var copy = document.getElementById("copy");
      var referenceFilesInput = document.getElementById("reference-files");
      var referenceList = document.getElementById("reference-list");
      var draft = null;
      var ghostDismissed = false;
      var requestTimer = null;
      var requestId = 0;
      var currentFingerprint = "";
      var referenceFiles = [];
      var storageKey = "article-editor-draft";
      /*
        GLM 续写需要先在当前浏览器配置 API Key。
        在浏览器控制台执行下面这行，并替换为自己的 API Key：
        localStorage.setItem("article-editor-glm-api-key", "你的 API Key")
        未配置时，编辑器可以正常写作和保存草稿，不会调用 GLM 续写。
      */
      var glmApiKey = localStorage.getItem("article-editor-glm-api-key") || "";
      var glmModel = "glm-5.1-highspeed";
      var glmUrl = "https://open.bigmodel.cn/api/paas/v4/chat/completions";
      var authorStyleProfile = [
        "贴近当前正文的表达方式，先把观察和判断讲清楚，再自然推到下一层。",
        "不用营销腔，不用总结腔，不用夸张句。",
        "段落可以短，句子要顺，允许有一点口语感。",
        "优先延续当前正文已经出现的用词、节奏、判断方式和段落长度。"
      ].join("\n");

      function countWords(value) {
        return String(value || "")
          .replace(/!\[[^\]]*\]\([^)]+\)/g, "")
          .replace(/[#>*_`~[\]()!-]/g, "")
          .replace(/\s+/g, "")
          .length;
      }

      function suggestionFingerprint() {
        return [
          title.value.trim(),
          content.value,
          content.selectionStart,
          content.selectionEnd,
          selectedReferenceSignature()
        ].join("\u241f");
      }

      function selectedReferenceSignature() {
        return referenceFiles.filter(function (file) {
          return file.selected;
        }).map(function (file) {
          return file.id + ":" + file.text.length;
        }).join("|");
      }

      function selectedReferenceText(maxLength) {
        var budget = maxLength || 6000;
        var selectedFiles = referenceFiles.filter(function (file) {
          return file.selected && file.text;
        });
        return selectedFiles.map(function (file) {
          return [
            "文件：" + file.name,
            file.text.slice(0, Math.max(600, Math.floor(budget / Math.max(1, selectedFiles.length))))
          ].join("\n");
        }).join("\n\n").slice(0, budget);
      }

      function writingStyleSample(maxLength) {
        var text = content.value.trim();
        if (!text) return "当前正文还没有可学习的文风样本。";
        return text.slice(-1 * (maxLength || 2400));
      }

      function hasWritingContext() {
        return !!content.value.trim() || !!selectedReferenceText(1);
      }

      function renderReferenceFiles() {
        if (!referenceFiles.length) {
          referenceList.innerHTML = '<div class="reference-empty">还没有参考文件。</div>';
          return;
        }

        referenceList.innerHTML = referenceFiles.map(function (file) {
          return [
            '<label class="reference-item">',
            '  <input type="checkbox" data-reference-select="' + file.id + '"' + (file.selected ? " checked" : "") + '>',
            '  <span>',
            '    <span class="reference-name">' + escapeHtml(file.name) + "</span>",
            '    <span class="reference-meta">' + file.text.length + " 字符" + (file.selected && file.text ? "，已作为上下文" : "，未参与续写") + (file.warning ? "，" + escapeHtml(file.warning) : "") + "</span>",
            "  </span>",
            '  <button class="reference-remove" type="button" data-reference-remove="' + file.id + '" aria-label="移除 ' + escapeHtml(file.name) + '">移除</button>',
            "</label>"
          ].join("");
        }).join("");
      }

      async function addReferenceFiles(files) {
        var nextFiles = Array.prototype.slice.call(files || []);
        for (var i = 0; i < nextFiles.length; i += 1) {
          var file = nextFiles[i];
          var text = "";
          var warning = "";
          try {
            text = cleanReferenceText(await file.text());
            if (!text) warning = "未读到文本";
          } catch (error) {
            warning = "读取失败";
          }
          referenceFiles.push({
            id: "ref-" + Date.now() + "-" + i + "-" + Math.random().toString(36).slice(2, 7),
            name: file.name,
            text: text.slice(0, 12000),
            warning: warning,
            selected: !!text
          });
        }
        renderReferenceFiles();
        remember();
        refreshCursorDraft();
      }

      function cleanReferenceText(value) {
        return String(value || "")
          .replace(/<[^>]+>/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function clearDraft() {
        draft = null;
        currentFingerprint = "";
        renderGhost(false);
      }

      function renderDraft(nextDraft, allowGhost) {
        draft = nextDraft;
        renderGhost(allowGhost);
      }

      function renderGhost(allowGhost) {
        var hasSelection = content.selectionStart !== content.selectionEnd;
        var active = document.activeElement === content;
        var latest = currentFingerprint === suggestionFingerprint();
        if (allowGhost === false || !latest || !draft || !draft.sentence || ghostDismissed || !active || hasSelection) {
          ghostLayer.classList.add("is-hidden");
          return;
        }

        var start = content.selectionStart;
        ghostBefore.textContent = content.value.slice(0, start);
        ghostText.textContent = draft.sentence;
        ghostAfter.textContent = content.value.slice(start);
        ghostLayer.scrollTop = content.scrollTop;
        ghostLayer.scrollLeft = content.scrollLeft;
        ghostLayer.classList.remove("is-hidden");
      }

      function normalizeGlmDraft(value) {
        var source = value || {};
        if (!source.sentence || !source.paragraph) {
          throw new Error("GLM 补全内容不完整");
        }
        return {
          sentence: cleanWritingText(source.sentence),
          paragraph: cleanWritingText(source.paragraph)
        };
      }

      function cleanWritingText(value) {
        return String(value || "")
          .replace(/[“”"'「」『』]/g, "")
          .replace(/[—–]/g, "，")
          .replace(/-{2,}/g, "，")
          .replace(/\s+/g, " ")
          .trim();
      }

      function parseGlmDraft(value) {
        var text = String(value || "").trim();
        var fenced = text.match(/```(?:json)?\s*([\s\S]*?)```/i);
        return normalizeGlmDraft(JSON.parse(fenced ? fenced[1].trim() : text));
      }

      async function loadGlmDraft(currentRequestId) {
        if (!glmApiKey || !hasWritingContext()) return;
        var requestFingerprint = suggestionFingerprint();
        currentFingerprint = "";
        renderGhost(false);
        saveState.textContent = "GLM 正在补全";

        try {
          var response = await fetch(glmUrl, {
            method: "POST",
            headers: {
              "Authorization": "Bearer " + glmApiKey,
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              model: glmModel,
              stream: false,
              thinking: { type: "disabled" },
              response_format: { type: "json_object" },
              max_tokens: 520,
              temperature: 0.62,
              messages: [
                {
                  role: "system",
                  content: [
                    "你是中文文章编辑器里的续写助手。",
                    "请贴着作者现有语气续写，不要解释，不要重写全文。",
                    "必须遵守两个优先要求。",
                    "第一，如果有选中的参考文件，续写必须参考这些文件中的事实、判断和表达方向，不要和文件内容冲突，不要把它们当成无关附件。",
                    "第二，续写必须跟随作者文风。先学习当前正文的用词、句子节奏、段落推进和判断方式，再参考作者文风要求。",
                    "参考文件负责内容依据。当前正文和作者文风要求负责文风。",
                    "不要照抄参考文件里的长句，除非作者正文已经这样写。",
                    "如果正文还很少，可以根据参考文件补出一个合适的开头或下一句。",
                    "sentence 是光标后可以直接接上的下一句。",
                    "paragraph 是光标后可以直接接上的一段正文。",
                    "续写不要使用引号。",
                    "续写不要使用破折号。",
                    "只返回 JSON，格式为 {\"sentence\":\"\",\"paragraph\":\"\"}。"
                  ].join("\n")
                },
                {
                  role: "user",
                  content: [
                    "标题：",
                    title.value.trim() || "无标题文章",
                    "",
                    "正文上下文：",
                    content.value.trim().slice(-5000),
                    "",
                    "作者文风要求：",
                    authorStyleProfile,
                    "",
                    "当前正文文风样本：",
                    writingStyleSample(2400),
                    "",
                    "右侧选中的参考文件，续写必须参考：",
                    selectedReferenceText(5000) || "无"
                  ].join("\n")
                }
              ]
            })
          });
          var result = await response.json();
          var message = result.choices && result.choices[0] && result.choices[0].message;
          if (!response.ok) {
            throw new Error(result.error && result.error.message || "GLM 请求失败");
          }
          if (currentRequestId !== requestId || requestFingerprint !== suggestionFingerprint()) return;
          currentFingerprint = requestFingerprint;
          renderDraft(parseGlmDraft(message && message.content), true);
          saveState.textContent = "GLM 补全已更新";
        } catch (error) {
          if (currentRequestId !== requestId) return;
          clearDraft();
          saveState.textContent = "GLM 暂未返回";
        }
      }

      function queueGlmDraft(delay) {
        if (requestTimer) {
          clearTimeout(requestTimer);
        }
        requestId += 1;
        var currentRequestId = requestId;
        requestTimer = setTimeout(function () {
          loadGlmDraft(currentRequestId);
        }, typeof delay === "number" ? delay : 900);
      }

      function refreshCursorDraft() {
        currentFingerprint = "";
        ghostDismissed = false;
        renderGhost(false);
        queueGlmDraft(220);
      }

      function renderStats() {
        var total = countWords(content.value);
        count.textContent = "字数 " + total;
        time.textContent = "预计阅读时间 " + (total ? Math.max(1, Math.ceil(total / 500)) : 0) + " 分钟";
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function remember() {
        try {
          localStorage.setItem(storageKey, JSON.stringify({
            title: title.value,
            content: content.value,
            referenceFiles: referenceFiles.map(function (file) {
              return {
                id: file.id,
                name: file.name,
                text: file.text,
                warning: file.warning,
                selected: file.selected
              };
            })
          }));
          saveState.textContent = "草稿已保存在本页";
        } catch (error) {
          saveState.textContent = "浏览器未保存草稿";
        }
      }

      function loadSavedDraft() {
        try {
          var saved = JSON.parse(localStorage.getItem(storageKey) || "null");
          if (!saved) return;
          title.value = typeof saved.title === "string" ? saved.title : "";
          content.value = typeof saved.content === "string" ? saved.content : "";
          referenceFiles = Array.isArray(saved.referenceFiles) ? saved.referenceFiles.map(function (file, index) {
            var text = typeof file.text === "string" ? file.text.slice(0, 12000) : "";
            return {
              id: typeof file.id === "string" ? file.id : "saved-ref-" + index,
              name: typeof file.name === "string" && file.name ? file.name : "参考文件",
              text: text,
              warning: typeof file.warning === "string" ? file.warning : "",
              selected: !!file.selected && !!text
            };
          }) : [];
        } catch (error) {}
      }

      function insertText(value, spacing) {
        var start = content.selectionStart;
        var end = content.selectionEnd;
        if (document.activeElement !== content && start === 0 && end === 0 && content.value) {
          start = content.value.length;
          end = content.value.length;
        }
        var before = content.value.slice(0, start);
        var after = content.value.slice(end);
        var spacer = spacing && before && !/\s$/.test(before) ? "\n\n" : "";
        var inserted = spacer + value;
        content.value = before + inserted + after;
        content.selectionStart = content.selectionEnd = start + inserted.length;
        content.focus();
        update();
      }

      function insertSentence(value) {
        var start = content.selectionStart;
        var end = content.selectionEnd;
        if (document.activeElement !== content && start === 0 && end === 0 && content.value) {
          start = content.value.length;
          end = content.value.length;
        }
        var before = content.value.slice(0, start);
        var after = content.value.slice(end);
        var spacer = before && /[A-Za-z0-9]$/.test(before) ? " " : "";
        var inserted = spacer + value;
        content.value = before + inserted + after;
        content.selectionStart = content.selectionEnd = start + inserted.length;
        content.focus();
        update();
      }

      function update() {
        ghostDismissed = false;
        currentFingerprint = "";
        renderGhost(false);
        renderStats();
        clearDraft();
        remember();
        queueGlmDraft();
      }

      title.addEventListener("input", update);
      content.addEventListener("input", update);
      content.addEventListener("focus", renderGhost);
      content.addEventListener("click", refreshCursorDraft);
      content.addEventListener("select", refreshCursorDraft);
      content.addEventListener("keyup", function (event) {
        if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Home", "End", "PageUp", "PageDown"].indexOf(event.key) >= 0) {
          refreshCursorDraft();
        } else {
          renderGhost();
        }
      });
      content.addEventListener("scroll", renderGhost);
      content.addEventListener("blur", function () {
        ghostLayer.classList.add("is-hidden");
      });
      content.addEventListener("keydown", function (event) {
        if (event.key === "Tab" && !event.shiftKey) {
          if (!draft || !draft.sentence) return;
          event.preventDefault();
          insertSentence(draft.sentence);
        }
        if (event.key === "Escape") {
          event.preventDefault();
          ghostDismissed = true;
          renderGhost();
        }
        if (event.altKey && event.key === "]") {
          if (!draft || !draft.paragraph) return;
          event.preventDefault();
          insertText(draft.paragraph, true);
        }
      });

      referenceFilesInput.addEventListener("change", function () {
        addReferenceFiles(referenceFilesInput.files);
        referenceFilesInput.value = "";
      });

      referenceList.addEventListener("change", function (event) {
        var selectedId = event.target.getAttribute("data-reference-select");
        if (!selectedId) return;
        referenceFiles.forEach(function (file) {
          if (file.id === selectedId) file.selected = event.target.checked;
        });
        renderReferenceFiles();
        remember();
        refreshCursorDraft();
      });

      referenceList.addEventListener("click", function (event) {
        var removeId = event.target.getAttribute("data-reference-remove");
        if (!removeId) return;
        event.preventDefault();
        referenceFiles = referenceFiles.filter(function (file) {
          return file.id !== removeId;
        });
        renderReferenceFiles();
        remember();
        refreshCursorDraft();
      });

      copy.addEventListener("click", function () {
        var markdown = "# " + (title.value.trim() || "无标题文章") + "\n\n" + content.value.trim();
        if (!navigator.clipboard) {
          copy.textContent = "当前浏览器不支持复制";
          return;
        }
        navigator.clipboard.writeText(markdown).then(function () {
          copy.textContent = "已复制";
          setTimeout(function () {
            copy.textContent = "复制 Markdown";
          }, 1400);
        }).catch(function () {
          copy.textContent = "复制失败";
        });
      });

      loadSavedDraft();
      renderReferenceFiles();
      renderStats();
      clearDraft();
      queueGlmDraft(0);
    })();
  </script>
</body>
</html>
